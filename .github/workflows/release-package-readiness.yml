name: Release Package Readiness

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  package-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Package Contents
        run: pnpm package:dry-run:check

      - name: Clean Local Package Install Smoke
        run: pnpm package:smoke:check

      - name: Attest Local Package Evidence
        uses: actions/attest@v4
        with:
          subject-path: |
            docs/generated/package-contents-manifest.json
            docs/generated/package-install-smoke.json
            docs/generated/sbom.cdx.json
